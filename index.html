<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FruitScan — AI Adulteration Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#07090b;
      --surface:#0e1115;
      --surface2:#141920;
      --border:#1c2433;
      --border2:#263040;
      --fresh:#22c55e;
      --fresh-bg:#0d2a1a;
      --rotten:#f87171;
      --rotten-bg:#2a0d0d;
      --adult:#fbbf24;
      --adult-bg:#2a1f08;
      --text:#dde4ed;
      --muted:#5a6a7e;
      --accent:#38bdf8;
      --radius:12px;
    }

    html{font-size:16px}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Space Mono',monospace;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* animated background grid */
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        linear-gradient(var(--border) 1px,transparent 1px),
        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:52px 52px;
      opacity:.25;
    }

    /* grain */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
      opacity:.4;
    }

    .page{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:44px 20px 80px}

    /* ── header ── */
    header{
      display:flex;align-items:center;gap:16px;
      padding-bottom:28px;
      border-bottom:1px solid var(--border);
      margin-bottom:36px;
    }
    .logo{
      width:50px;height:50px;border-radius:14px;flex-shrink:0;
      background:linear-gradient(135deg,#16a34a,#0891b2);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;
      box-shadow:0 0 28px #22c55e33;
    }
    h1{font-family:'Syne',sans-serif;font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:800;letter-spacing:-1px;line-height:1}
    h1 em{font-style:normal;color:var(--fresh)}
    .sub{font-size:.7rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:5px}
    .badge{
      margin-left:auto;
      background:var(--fresh-bg);border:1px solid var(--fresh);
      color:var(--fresh);font-size:.65rem;letter-spacing:1.5px;
      padding:5px 12px;border-radius:100px;text-transform:uppercase;
      animation:glow 2.5s ease-in-out infinite;
    }
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 #22c55e33}50%{box-shadow:0 0 12px 3px #22c55e33}}

    /* ── api key bar ── */
    .key-bar{
      display:flex;gap:10px;align-items:center;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px 18px;
      margin-bottom:28px;
    }
    .key-icon{font-size:1.1rem;flex-shrink:0}
    .key-bar input{
      flex:1;background:transparent;border:none;outline:none;
      font-family:'Space Mono',monospace;font-size:.78rem;color:var(--text);
    }
    .key-bar input::placeholder{color:var(--muted)}
    .key-hint{font-size:.65rem;color:var(--muted);white-space:nowrap}
    .key-hint a{color:var(--accent);text-decoration:none}
    .key-hint a:hover{text-decoration:underline}

    /* ── layout ── */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    @media(max-width:700px){.grid{grid-template-columns:1fr}}

    /* ── panel ── */
    .panel{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
    }
    .panel-head{
      padding:13px 18px;
      border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
    }
    .panel-title{
      font-family:'Syne',sans-serif;font-weight:700;
      font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    }
    .panel-body{padding:18px}

    /* ── dropzone ── */
    .drop{
      border:2px dashed var(--border2);border-radius:10px;
      padding:44px 20px;text-align:center;cursor:pointer;
      transition:all .22s;position:relative;overflow:hidden;
    }
    .drop::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse at 50% 0%,#22c55e0d 0%,transparent 65%);
      opacity:0;transition:opacity .3s;
    }
    .drop:hover,.drop.over{border-color:var(--fresh);box-shadow:0 0 24px #22c55e22}
    .drop:hover::before,.drop.over::before{opacity:1}
    .drop-ico{font-size:2.8rem;display:block;margin-bottom:12px}
    .drop-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:5px}
    .drop-sub{font-size:.7rem;color:var(--muted)}
    #fileIn{display:none}

    /* preview */
    #preview{width:100%;border-radius:8px;display:none;margin-top:14px;max-height:300px;object-fit:contain}
    #preview.show{display:block}

    /* analyze btn */
    .btn-go{
      width:100%;margin-top:14px;padding:13px;
      background:linear-gradient(135deg,var(--fresh),var(--accent));
      border:none;border-radius:10px;
      font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:1px;
      color:#000;cursor:pointer;transition:all .2s;display:none;
    }
    .btn-go.show{display:block}
    .btn-go:hover{transform:translateY(-2px);box-shadow:0 0 24px #22c55e44}
    .btn-go:disabled{background:var(--border);color:var(--muted);transform:none;box-shadow:none;cursor:not-allowed}

    /* spinner */
    .spin{display:inline-block;width:14px;height:14px;border:2px solid #00000033;border-top-color:#000;border-radius:50%;animation:s .6s linear infinite;margin-right:7px;vertical-align:middle}
    @keyframes s{to{transform:rotate(360deg)}}

    /* error */
    .err{
      display:none;margin-top:12px;padding:12px 15px;
      background:#2a0a0a;border:1px solid #7f1d1d;
      border-radius:8px;color:var(--rotten);font-size:.75rem;line-height:1.7;
    }
    .err.show{display:block}

    /* ── result side ── */
    .result-box{
      width:100%;aspect-ratio:4/3;background:#050709;
      border-radius:8px;overflow:hidden;position:relative;
      display:flex;align-items:center;justify-content:center;
    }
    .result-box img{width:100%;height:100%;object-fit:contain;display:none}
    .result-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:.75rem}
    .result-ph span{font-size:2.2rem;opacity:.3}

    /* scan line */
    .scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fresh),transparent);animation:sc 1.6s linear infinite;display:none}
    .scanning .scan{display:block}
    @keyframes sc{from{top:0}to{top:100%}}

    /* pills row */
    .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .pill{
      padding:6px 14px;border-radius:100px;font-family:'Syne',sans-serif;
      font-weight:700;font-size:.72rem;letter-spacing:.5px;border:1px solid;
    }
    .pill.fresh{color:var(--fresh);border-color:#166534;background:var(--fresh-bg)}
    .pill.rotten{color:var(--rotten);border-color:#7f1d1d;background:var(--rotten-bg)}
    .pill.adult{color:var(--adult);border-color:#78350f;background:var(--adult-bg)}
    .pill.info{color:var(--accent);border-color:#075985;background:#0c1f2e}

    /* ── detection cards ── */
    #detSec{margin-top:18px;display:none}
    .det-list{display:flex;flex-direction:column;gap:10px;margin-top:2px}
    .dc{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;
    }
    .dc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
    .dc.fresh::before{background:var(--fresh)}
    .dc.rotten::before{background:var(--rotten)}
    .dc.adulterated::before{background:var(--adult)}

    .dc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px;flex-wrap:wrap}
    .dc-cls{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
    .dc-cls.fresh{color:var(--fresh)}
    .dc-cls.rotten{color:var(--rotten)}
    .dc-cls.adulterated{color:var(--adult)}
    .dc-desc{font-size:.7rem;color:var(--muted);margin-top:2px;line-height:1.5}
    .dc-conf{
      font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;
      flex-shrink:0;
    }
    .dc-conf.fresh{color:var(--fresh)}
    .dc-conf.rotten{color:var(--rotten)}
    .dc-conf.adulterated{color:var(--adult)}

    /* bar */
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .bar-label{font-size:.65rem;color:var(--muted);width:76px;flex-shrink:0;text-align:right}
    .bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
    .bar-val{font-size:.65rem;color:var(--text);width:38px;flex-shrink:0;text-align:right}

    /* indicators */
    .indicators{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .ind{
      font-size:.62rem;padding:3px 9px;border-radius:4px;
      background:var(--border);color:var(--muted);
    }
    .ind.hi{background:var(--border2);color:var(--text)}

    /* reasoning */
    .reasoning{
      margin-top:10px;padding:10px 12px;
      background:var(--bg);border:1px solid var(--border);
      border-radius:8px;font-size:.72rem;color:var(--muted);line-height:1.7;
    }

    /* ── empty / loading state ── */
    .empty{text-align:center;color:var(--muted);font-size:.75rem;padding:20px 0}

    footer{
      position:relative;z-index:1;text-align:center;
      color:var(--muted);font-size:.62rem;letter-spacing:1.5px;
      padding:24px;border-top:1px solid var(--border);margin-top:36px;
      text-transform:uppercase;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- header -->
  <header>
    <div class="logo">🍎</div>
    <div>
      <h1>Fruit<em>Scan</em></h1>
      <p class="sub">AI Adulteration Detection</p>
    </div>
    <div class="badge">AI Powered</div>
  </header>

  <!-- API key input -->
  <div class="key-bar">
    <span class="key-icon">🔑</span>
    <input type="password" id="apiKey" placeholder="Paste your Anthropic API key here — sk-ant-..." />
    <span class="key-hint">Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></span>
  </div>

  <!-- main grid -->
  <div class="grid">

    <!-- LEFT: upload -->
    <div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Upload Fruit Image</span>
          <span style="font-size:.62rem;color:var(--muted)">JPG / PNG / JPEG</span>
        </div>
        <div class="panel-body">
          <div class="drop" id="drop"
            onclick="document.getElementById('fileIn').click()"
            ondragover="ev(event,'over')"
            ondragleave="ev(event,'leave')"
            ondrop="ev(event,'drop')">
            <span class="drop-ico">📷</span>
            <p class="drop-lbl">Drop image here</p>
            <p class="drop-sub">or click to browse</p>
          </div>
          <input type="file" id="fileIn" accept="image/*" onchange="loadFile(this.files[0])"/>
          <img id="preview" alt="preview"/>
          <button class="btn-go" id="goBtn" onclick="analyze()">ANALYZE FRUIT</button>
          <div class="err" id="errBox"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: output -->
    <div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Detection Output</span>
          <span style="font-size:.62rem;color:var(--muted)" id="modeTag">—</span>
        </div>
        <div class="panel-body">
          <div class="result-box" id="resultBox">
            <div class="result-ph" id="rph"><span>🔬</span>Annotated output appears here</div>
            <img id="resultImg" alt="result"/>
            <div class="scan" id="scanLine"></div>
          </div>
          <div class="pills" id="pillsRow"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- detection cards -->
  <div id="detSec">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Per-Object Analysis</span>
        <span id="detCount" style="font-size:.62rem;color:var(--muted)"></span>
      </div>
      <div class="panel-body">
        <div class="det-list" id="detList"></div>
      </div>
    </div>
  </div>

</div><!-- /page -->

<footer>FruitScan — Powered by Claude Vision AI — No Backend Required</footer>

<script>
// ── state ──
let selectedFile = null;
let selectedB64  = null;
let selectedMime = 'image/jpeg';

// ── drag/drop ──
function ev(e, type) {
  e.preventDefault();
  const drop = document.getElementById('drop');
  if (type === 'over')  drop.classList.add('over');
  if (type === 'leave') drop.classList.remove('over');
  if (type === 'drop') {
    drop.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  }
}

function loadFile(file) {
  selectedFile = file;
  selectedMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    const b64full = e.target.result;          // data:image/jpeg;base64,....
    selectedB64 = b64full.split(',')[1];      // just the base64 part

    const prev = document.getElementById('preview');
    prev.src = b64full;
    prev.classList.add('show');
    document.getElementById('goBtn').classList.add('show');
    clearResults();
  };
  reader.readAsDataURL(file);
}

// ── analyze via Claude API ──
async function analyze() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { showErr('Please paste your Anthropic API key above first.'); return; }
  if (!selectedB64) return;

  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>ANALYZING…';
  clearErr();
  startScan();

  // Show the uploaded image as "result" immediately while waiting
  document.getElementById('resultImg').src = `data:${selectedMime};base64,${selectedB64}`;
  document.getElementById('resultImg').style.display = 'block';
  document.getElementById('rph').style.display = 'none';

  const prompt = `You are a fruit quality and adulteration detection expert AI.

Analyze this fruit image carefully and detect ALL individual fruits visible.

For EACH fruit object detected, provide:
1. What type of fruit it is
2. Classification: FRESH, ROTTEN, or ADULTERATED
   - FRESH: normal color, firm appearance, no visible decay or chemical treatment
   - ROTTEN: discoloration, mold, decay, soft spots, dark patches
   - ADULTERATED: artificial coloring, chemical coating, unnatural shine, wax coating, artificially ripened appearance, suspicious uniformity
3. Confidence percentage (0-100%)
4. Probability breakdown for all 3 classes
5. Key visual indicators you used
6. Brief reasoning

Respond ONLY with valid JSON, no markdown, no extra text:
{
  "total_fruits": <number>,
  "overall_status": "FRESH" | "ROTTEN" | "ADULTERATED" | "MIXED",
  "summary": "<one line summary>",
  "detections": [
    {
      "id": 1,
      "fruit_type": "<type>",
      "class": "fresh" | "rotten" | "adulterated",
      "confidence": <0-100>,
      "probabilities": {
        "fresh": <0-100>,
        "rotten": <0-100>,
        "adulterated": <0-100>
      },
      "indicators": ["<indicator1>", "<indicator2>"],
      "reasoning": "<2-3 sentence explanation>"
    }
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: selectedMime, data: selectedB64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const raw = data.content[0].text.trim();

    // parse JSON (strip any accidental markdown fences)
    let result;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      result = JSON.parse(clean);
    } catch(e) {
      throw new Error('Could not parse AI response. Try again.');
    }

    renderResults(result);

  } catch(e) {
    showErr(e.message);
    // restore placeholder if no result
    document.getElementById('resultImg').style.display = 'none';
    document.getElementById('rph').style.display = 'flex';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'ANALYZE FRUIT';
    stopScan();
  }
}

// ── render ──
function renderResults(r) {
  // pills
  const row = document.getElementById('pillsRow');
  row.innerHTML = '';
  const statusColor = {FRESH:'fresh',ROTTEN:'rotten',ADULTERATED:'adult',MIXED:'info'};
  addPill(row, `🧬 ${r.overall_status}`, statusColor[r.overall_status] || 'info');
  addPill(row, `${r.total_fruits} fruit${r.total_fruits!==1?'s':''} detected`, 'info');
  if (r.summary) addPill(row, r.summary, 'info');
  document.getElementById('modeTag').textContent = 'Claude Vision AI';

  // detection cards
  const sec  = document.getElementById('detSec');
  const list = document.getElementById('detList');
  const cnt  = document.getElementById('detCount');
  list.innerHTML = '';
  sec.style.display = 'block';
  cnt.textContent = `${r.detections.length} object${r.detections.length!==1?'s':''}`;

  const clsColor = {fresh:'var(--fresh)', rotten:'var(--rotten)', adulterated:'var(--adult)'};

  r.detections.forEach((d,i) => {
    const cls = d.class.toLowerCase();
    const col = clsColor[cls] || 'var(--muted)';
    const probs = d.probabilities || {};
    const indicators = (d.indicators||[]).slice(0,4);

    const card = document.createElement('div');
    card.className = `dc ${cls}`;
    card.innerHTML = `
      <div class="dc-top">
        <div>
          <div class="dc-cls ${cls}">${cls.toUpperCase()} — ${d.fruit_type || 'Fruit'} #${d.id||i+1}</div>
          <div class="dc-desc">${d.reasoning || ''}</div>
        </div>
        <div class="dc-conf ${cls}">${d.confidence}%</div>
      </div>
      ${['fresh','rotten','adulterated'].map(k=>`
        <div class="bar-row">
          <span class="bar-label">${k}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${probs[k]||0}%;background:${clsColor[k]}"></div></div>
          <span class="bar-val">${(probs[k]||0).toFixed(1)}%</span>
        </div>`).join('')}
      ${indicators.length ? `
        <div class="indicators">
          ${indicators.map(ind=>`<span class="ind hi">• ${ind}</span>`).join('')}
        </div>` : ''}
    `;
    list.appendChild(card);
  });
}

function addPill(row, text, cls) {
  const p = document.createElement('span');
  p.className = `pill ${cls}`;
  p.textContent = text;
  row.appendChild(p);
}

// ── helpers ──
function clearResults() {
  document.getElementById('pillsRow').innerHTML = '';
  document.getElementById('detSec').style.display = 'none';
  document.getElementById('modeTag').textContent = '—';
  document.getElementById('resultImg').style.display = 'none';
  document.getElementById('rph').style.display = 'flex';
  clearErr();
}
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg; el.classList.add('show');
}
function clearErr() { document.getElementById('errBox').classList.remove('show'); }
function startScan() { document.getElementById('resultBox').classList.add('scanning'); }
function stopScan()  { document.getElementById('resultBox').classList.remove('scanning'); }

// persist API key
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('fs_key');
  if (saved) document.getElementById('apiKey').value = saved;
  document.getElementById('apiKey').addEventListener('change', e => {
    localStorage.setItem('fs_key', e.target.value.trim());
  });
});
</script>
</body>
</html>
